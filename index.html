<!--
Project: Circle Calculator
Description: An interactive web app that calculates the area, circumference, and diameter of a circle based on the radius entered by the user.
Author: Alfred James Arocha
Technologies: HTML, CSS, JavaScript
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Circle Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Circle Calculator</h1>
        <p>Enter the radius of the circle:</p>

        <input type="number" id="radius" placeholder="Radius">
        <button onclick="calculateCircle()">Calculate</button>

        <div class="results">
            <p id="area"></p>
            <p id="circumference"></p>
            <p id="diameter"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
